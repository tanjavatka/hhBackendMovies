<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Movies</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Kalam:wght@300;400;700&display=swap"
    rel="stylesheet">

  <!-- Oma CSS -->
  <link rel="stylesheet" th:href="@{/styles.css}">

</head>

<body>
  <div class="container mt-3">
    <div style="display:flex; justify-content: space-between; align-items: center;">

      <h1> <span sec:authentication="name" class="username-color"></span> 's Movie Reviews </h1>

      <div>
        <form th:action="@{/logout}" method="post">
          <button type="submit" class=" btn btn-info btn-sm align-right"> Sign out </button>
        </form>
      </div>
    </div>

    <table class="table table-hover">
      <thead class="table-info">
        <tr>
          <th> Movie </th>
          <th> Year </th>
          <th> Genre </th>
          <th> Rating </th>
          <th> Status </th>
          <th> Comment </th>
          <th></th>
          <th></th>
        </tr>
      </thead>

      <tr th:each="mymovie : ${mymovies}">

        <p th:text="${movies}"></p>

        <td th:text="${mymovie.movie.title}"></td>
        <td th:text="${mymovie.movie.year}"></td>
        <td th:text="${mymovie.movie.genre}"></td>

        <td th:text="${mymovie.rating}"></td>
        <td th:text="${mymovie.status}"></td>
        <td th:text="${mymovie.comment}"></td>

        <td>
          <a th:href="@{/editreview/{id} (id=${mymovie.reviewId})}" class="btn btn-info btn-sm custom-btn">
            Edit
          </a>
        </td>
        <td>
          <a th:href="@{/deletereview/{id} (id=${mymovie.reviewId})}" class="btn btn-danger btn-sm custom-btn">
            Delete
          </a>
        </td>
      </tr>
    </table>

    <a th:href="@{/movies}" class="btn btn-info btn-sm"> Movies </a>
    <a th:href="@{/addmoviereview}" class="btn btn-info btn-sm"> + Add a new movie review </a>
    <a th:href="@{/addmovie}" class="btn btn-info btn-sm"> + Add a new movie </a>

  </div>
</body>

</html>
