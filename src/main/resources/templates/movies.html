<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movies</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Kalam:wght@300;400;700&display=swap"
    rel="stylesheet">

  <!-- Oma CSS -->
  <link rel="stylesheet" th:href="@{/styles.css}">

</head>

<body>
  <div class="container mt-3">
    <div style="display:flex; justify-content: space-between; align-items: center;">

      <h1> Movies </h1>

      <div>
        <div sec:authorize="isAnonymous()">
          <a href="/login" class=" btn btn-info btn-sm align-right">Sign in</a>
          <a href="/register" class=" btn btn-danger btn-sm align-right">Register</a>
        </div>

        <div sec:authorize="isAuthenticated()">
          <form th:action="@{/logout}" method="post">
            <button type="submit" class=" btn btn-info btn-sm align-right"> Sign out </button>
          </form>
        </div>
      </div>

    </div>

    <!-- Error viesti, jos admin yrittää poistaa elokuvaa, jossa arvostelu! -->
    <div th:if="${error}" class="d-flex justify-content-center">
      <div class="alert alert-danger text-center py-1">
        <span th:text="${error}"></span>
      </div>
    </div>

    <table class="table table-hover">
      <thead class="table-info">
        <tr>
          <th> Title </th>
          <th> Year </th>
          <th> Genre </th>
          <th></th>
          <th></th>
        </tr>
      </thead>

      <tr th:each="movie : ${movies}">
        <td th:text="${movie.Title}"></td>
        <td th:text="${movie.Year}"></td>
        <td th:text="${movie.Genre}"></td>
        <td sec:authorize="hasAnyRole('USER','ADMIN')">
          <a th:href="@{/editmovie/{id}(id=${movie.movieId})}" class="btn btn-info btn-sm custom-btn">
            Edit
          </a>
        </td>
        <!-- <td><a th:href="@{/addmoviereview/{id}(id=${movie.movieId})}"> Add new review </a></td> -->
        <td sec:authorize="hasRole('ADMIN')">
          <a th:href="@{/deletemovie/{id}(id=${movie.movieId})}" class="btn btn-danger btn-sm custom-btn">
            Delete
          </a>
        </td>
      </tr>
    </table>

    <div sec:authorize="hasAnyRole('USER','ADMIN')">
      <a th:href="@{/mymovies}" class="btn btn-info btn-sm"> My Movies </a>
      <a th:href="@{/addmovie}" class=" btn btn-info btn-sm"> + Add a new movie </a>
      <a th:href="@{/addmoviereview}" class="btn btn-info btn-sm"> + Add a new movie review </a>
    </div>
  </div>
</body>

</html>
