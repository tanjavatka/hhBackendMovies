<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movies</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Kalam:wght@300;400;700&display=swap"
    rel="stylesheet">

  <!-- Oma CSS -->
  <link rel="stylesheet" th:href="@{/styles.css}">

</head>

<body>
  <div class="container mt-3">
    <h1> Movies </h1>

    <table class="table table-hover">
      <thead class="table-info">
        <tr>
          <th> Title </th>
          <th> Year </th>
          <th> Genre </th>
          <th></th>
        </tr>
      </thead>

      <tr th:each="movie : ${movies}">
        <td th:text="${movie.Title}"></td>
        <td th:text="${movie.Year}"></td>
        <td th:text="${movie.Genre}"></td>
        <td><a th:href="@{/editmovie/{id}(id=${movie.movieId})}" class="btn btn-info btn-sm custom-btn"> Edit </a></td>
        <!-- <td><a th:href="@{/addmoviereview/{id}(id=${movie.movieId})}"> Add new review </a></td> -->
        <!-- <td><a th:href="@{/delete/{id}(id=${movie.movieId})}"> Delete </a></td> -->
      </tr>
    </table>

    <a th:href="@{/addmovie}" class=" btn btn-info btn-sm"> Add a new movie </a>
    <a th:href="@{/mymovies}" class="btn btn-info btn-sm"> My Movies </a>
    <a th:href="@{/addmoviereview}" class="btn btn-info btn-sm"> Add a new movie review </a>
  </div>
</body>

</html>
