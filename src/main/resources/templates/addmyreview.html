<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> New Movie Review </title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Kalam:wght@300;400;700&display=swap"
    rel="stylesheet">

  <!-- Oma CSS -->
  <link rel="stylesheet" th:href="@{/styles.css}">

</head>

<body>
  <div class="container mt-3">
    <h3> New Movie Review </h3>
    <div class="row">
      <div class="row">

        <form th:object="${moviereview}" th:action="@{/savereview}" action="#" method="post">

          <!-- Error viesti, jos movie puuttuu!  -->
          <div class="text-danger" th:if="${#fields.hasErrors('movie')}" th:errors="*{movie}">
          </div>

          <select th:field="*{movie}" class="form-select form-select-sm">
            <option value=""> -- Select movie -- </option>
            <option th:each="movie : ${movies}" th:value="${movie.movieId}" th:text="${movie.title}">
            </option>
          </select>

          <a th:href="@{/addmovie}" class="btn btn-info btn-sm"> Movie not found? Add new </a>

          <br>

          <select th:field="*{rating}" class="form-select form-select-sm">
            <option value=""> -- Rating -- </option>
            <option th:each="rate : ${ratings}" th:value="${rate}" th:text="${rate}">
            </option>
          </select>

          <!-- Error viesti, jos status puuttuu!  -->
          <div class="text-danger" th:if="${#fields.hasErrors('status')}" th:errors="*{status}">
          </div>

          <select th:field="*{status}" class="form-select form-select-sm">
            <option value=""> -- Movie Status -- </option>
            <option th:each="status : ${statuses}" th:value="${status}" th:text="${status.label}">
            </option>
          </select>

          <div>
            <input type="text" id="review" th:field="${moviereview.comment}" placeholder="Movie Review/Comment">
          </div>

          <button type="submit" value="Save" class="btn btn-info btn-sm"> Save </button>
          <a th:href="@{/mymovies}" class="btn btn-info btn-sm"> Cancel </a>

        </form>
      </div>
    </div>
</body>

</html>
