<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit My Review</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Kalam:wght@300;400;700&display=swap"
    rel="stylesheet">

  <!-- Oma CSS -->
  <link rel="stylesheet" th:href="@{/styles.css}">

</head>

<body>
  <div class="container mt-3">
    <h3> Edit My Review </h3>

    <form th:object="${moviereview}" th:action="@{/savereview}" action="#" method="post">
      <input type="hidden" th:field="${moviereview.reviewId}">
      <input type="hidden" th:field="${moviereview.movie.movieId}">

      <!-- Movie : Ei muokattavissa -->
      <div>
        <input type="text" id="title" th:field="${moviereview.movie.title}" disabled>
      </div>

      <div>
        <input type="text" id="year" th:field="${moviereview.movie.year}" disabled>
      </div>

      <div>
        <input type="text" id="genre" th:field="${moviereview.movie.genre}" disabled>
      </div>

      <!-- Review : muokattavissa -->

      <select th:field="*{rating}" class="form-select form-select-sm">
        <option value=""> -- Rating -- </option>
        <option th:each="rate : ${ratings}" th:value="${rate}" th:text="${rate}">
        </option>
      </select>

      <!-- Error viesti, jos statusta ei ole valittu! -->
      <div class="text-danger" th:if="${#fields.hasErrors('status')}" th:errors="*{status}">
      </div>

      <select class="form-select form-select-sm" th:field="${moviereview.status}">
        <option value=""> -- Movie Status -- </option>
        <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}">
        </option>
      </select>

      <div>
        <input type="text" id="review" th:field="${moviereview.comment}" placeholder="Movie Review/Comment">
      </div>

      <button type="submit" value="Save" class="btn btn-info btn-sm"> Save </button>
      <a th:href="@{/mymovies}" class="btn btn-info btn-sm"> Cancel </a>

    </form>
  </div>
</body>

</html>
