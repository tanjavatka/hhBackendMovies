<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Edit Movie</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Kalam:wght@300;400;700&display=swap"
    rel="stylesheet">

  <!-- Oma CSS -->
  <link rel="stylesheet" th:href="@{/styles.css}">

</head>

<body>
  <div class="container mt-3">
    <h3> Edit Movie</h3>

    <form th:object="${movie}" th:action="@{/savemovie}" action="#" method="post">

      <input type="hidden" th:field="${movie.movieId}">

      <div>
        <div class="text-danger" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">
        </div>
        <input type="text" id="title" th:field="${movie.title}" placeholder="Movie Title">
      </div>

      <div>
        <input type="text" id="year" th:field="${movie.year}" placeholder="Movie Publication Year">
      </div>

      <div>
        <input type="text" id="genre" th:field="${movie.genre}" placeholder="Movie Genre">
      </div>

      <button type="submit" value="Save" class="btn btn-info btn-sm"> Save </button>
      <a th:href="@{/movies}" class="btn btn-info btn-sm"> Cancel </a>
    </form>
  </div>
</body>

</html>
